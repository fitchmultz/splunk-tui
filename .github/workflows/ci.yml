# Purpose: Fast, non-mutating PR CI gate for high-signal feedback.
# Responsibilities: Validate lint/type/smoke/docs/script quality quickly on pull requests.
# Scope: Resource-bounded Rust checks, smoke tests, docs drift, and secret guard.
# Usage: Runs automatically for pull requests and can be invoked manually.
# Invariants: Must remain deterministic, non-mutating, and resource-conscious.
name: CI (Fast PR Gate)

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-fast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTENV_DISABLED: "1"
  CARGO_JOBS: "4"
  RUST_TEST_THREADS: "1"
  CI_LIVE_TESTS_MODE: "skip"

jobs:
  rust-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.84"
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run fast CI gate contract
        run: make ci-fast
