# Purpose: Full-depth CI for mainline confidence, nightly drift detection, and manual release checks.
# Responsibilities: Run the complete local CI contract including full tests and CI-profile build.
# Scope: Main branch pushes, scheduled nightly validation, and workflow-dispatch runs.
# Usage: Automated on schedule/push; manually trigger for pre-release confidence.
# Invariants: Must stay non-mutating and avoid user-directory install side effects.
name: CI (Full)

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      live_tests_mode:
        description: "Live test mode for this run (required|optional|skip)"
        type: choice
        options:
          - skip
          - optional
          - required
        default: skip

concurrency:
  group: ci-full-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTENV_DISABLED: "1"
  CARGO_JOBS: "4"
  RUST_TEST_THREADS: "1"

jobs:
  rust-ci-full:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.84"
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run full CI gate contract
        env:
          CI_LIVE_TESTS_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.live_tests_mode || 'skip' }}
        run: make ci
